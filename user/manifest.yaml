apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    project: roboshop
    component: user
    env: dev
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      env: dev
      tier: app
  tempalte:
    metadata:
      labels:
        project: roboshop
        component: user
        env: dev
        tier: app
    spec:
      containers:
      - name: user
        image: shanmukhatadisetti/user:v1 
---
apiVersion: v1
kind: Service
metadata:
  name: user
  labels: 
    project: roboshop
    env: dev
spec:
  selector:
    project: roboshop
    component: user
    env: dev
    tier: app
  ports:
  - protocol:
    port: 8080
    targetPort: 8080